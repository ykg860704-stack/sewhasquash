<script type="module">
import { 
  getFirestore, collection, addDoc, query, onSnapshot, orderBy, 
  updateDoc, doc, getDocs, serverTimestamp, limit, deleteDoc,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

const firebaseConfig = {
    apiKey: "AIzaSyCliruITgfBt6mIaxlM4r0McQi5T1fu-pY",
    authDomain: "sehwa-squash-ranking-system.firebaseapp.com",
    projectId: "sehwa-squash-ranking-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =====================
// 🔥 채팅 (비용 최적화 polling)
// =====================
let lastChatTime = null;

async function loadChats() {
    const chatDisplay = document.getElementById("chatDisplay");

    let q;
    if (lastChatTime) {
        q = query(
            collection(db, "globalChats"),
            where("createdAt", ">", lastChatTime),
            orderBy("createdAt", "asc")
        );
    } else {
        q = query(
            collection(db, "globalChats"),
            orderBy("createdAt", "desc"),
            limit(20)
        );
    }

    const snap = await getDocs(q);
    let newChats = [];

    snap.forEach(d => {
        const data = d.data();
        newChats.push(data);

        if (!lastChatTime || data.createdAt?.toMillis() > lastChatTime?.toMillis()) {
            lastChatTime = data.createdAt;
        }
    });

    if (!chatDisplay.dataset.init) {
        newChats.reverse();
        chatDisplay.innerHTML = "";
        chatDisplay.dataset.init = "true";
    }

    newChats.forEach(data => {
        chatDisplay.innerHTML += `<div class="chat-msg">${data.text}</div>`;
    });

    chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

setInterval(loadChats, 3000);
loadChats();

window.sendChat = async () => {
    const msg = document.getElementById("chatInput").value.trim();
    if(!msg) return;

    await addDoc(collection(db, "globalChats"), {
        text: msg,
        createdAt: serverTimestamp()
    });

    document.getElementById("chatInput").value = "";
};

// =====================
// 🔥 게스트 게시글 + 댓글
// =====================

let guestPostsData = [];
let guestCommentsData = {};

async function loadAllComments(posts) {
    const result = {};

    for (const post of posts) {
        const snap = await getDocs(
            query(
                collection(db, "guestPosts", post.id, "comments"),
                orderBy("createdAt", "asc")
            )
        );

        result[post.id] = snap.docs.map(d => d.data());
    }

    return result;
}

// 게시글 + 댓글 같이 로드
const today = new Date().toISOString().split('T')[0];

onSnapshot(
    query(
        collection(db, "guestPosts"),
        where("date", ">=", today),
        orderBy("date", "asc"),
        limit(20)
    ),
    async (snap) => {
        guestPostsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // 🔥 댓글 한 번에 로드
        guestCommentsData = await loadAllComments(guestPostsData);

        renderGuestList();
    }
);

// =====================
// 🔥 렌더
// =====================
function renderGuestList() {
    const listDiv = document.getElementById("guest-list");
    if(!listDiv) return;

    let html = "";

    guestPostsData.forEach(data => {
        const postId = data.id;
        const comments = guestCommentsData[postId] || [];

        let commentHtml = comments.map(c => `
            <div class="comment-item">
                <b>${c.userName}</b>: ${c.text}
            </div>
        `).join('');

        html += `
        <div class="guest-card">
            <b>${data.name}</b> (${data.center})<br>
            ${data.date} / ${data.time}

            <div>
                ${commentHtml || "댓글 없음"}
            </div>

            <input id="cmtUser-${postId}" placeholder="닉네임">
            <input id="cmtText-${postId}" placeholder="댓글">

            <button onclick="submitComment('${postId}')">등록</button>
            <button onclick="deleteGuest('${postId}', '${data.pw}')">삭제</button>
        </div>`;
    });

    listDiv.innerHTML = html;
}

// =====================
// 🔥 댓글 작성
// =====================
window.submitComment = async (postId) => {
    const user = document.getElementById(`cmtUser-${postId}`).value.trim();
    const text = document.getElementById(`cmtText-${postId}`).value.trim();

    if(!user || !text) return alert("입력하세요");

    await addDoc(collection(db, "guestPosts", postId, "comments"), {
        userName: user,
        text,
        createdAt: serverTimestamp()
    });

    alert("등록됨");
};

// =====================
// 🔥 게시글 작성
// =====================
window.submitGuest = async () => {
    const name = document.getElementById("guestName").value;
    const date = document.getElementById("guestDate").value;
    const pw = document.getElementById("guestPw").value;

    if(!name || !date || !pw) return alert("입력");

    await addDoc(collection(db, "guestPosts"), {
        name,
        date,
        pw,
        center: "테스트",
        time: "자유",
        createdAt: serverTimestamp()
    });

    alert("등록 완료");
};

// =====================
// 🔥 삭제
// =====================
window.deleteGuest = async (id, correctPw) => {
    const input = prompt("비번");

    if(input === correctPw){
        await deleteDoc(doc(db, "guestPosts", id));
        alert("삭제 완료");
    } else {
        alert("틀림");
    }
};

</script>
