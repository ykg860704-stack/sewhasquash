<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿼시 시스템 통합 관리자</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #f1f3f5; padding: 20px; margin: 0; color: #333; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; font-weight: 800; border-bottom: 3px solid #2d3748; padding-bottom: 10px; margin-bottom: 30px; }
        .section { margin-bottom: 40px; }
        h2 { font-size: 18px; color: #2d3748; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; font-weight: 700; }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; margin-right: 4px; }
        .btn-approve { background: #3182ce; color: white; }
        .btn-edit { background: #718096; color: white; }
        .btn-delete { background: #e53e3e; color: white; }
        .status-tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 800; }
        .status-pending { background: #fff5f5; color: #e53e3e; }
        .status-approved { background: #f0fff4; color: #38a169; }
        input, select { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .edit-mode input { width: 100px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>🛡️ 스쿼시 시스템 통합 관리자</h1>

    <div class="section">
        <h2>👤 회원 승인 및 랭킹 수정</h2>
        <table id="playerTable">
            <thead>
                <tr>
                    <th>센터/이름</th>
                    <th>그룹/성별</th>
                    <th>순위</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="playerList"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>🏢 센터 정보 승인 및 관리</h2>
        <table id="centerTable">
            <thead>
                <tr>
                    <th>지역/상호명</th>
                    <th>영업시간</th>
                    <th>주소</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="centerList"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>🎾 대회 정보 승인 및 관리</h2>
        <table id="matchTable">
            <thead>
                <tr>
                    <th>대회명</th>
                    <th>날짜</th>
                    <th>장소</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="matchList"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCliruITgfBt6mIaxlM4r0McQi5T1fu-pY",
        authDomain: "sehwa-squash-ranking-system.firebaseapp.com",
        projectId: "sehwa-squash-ranking-system",
        storageBucket: "sehwa-squash-ranking-system.firebasestorage.app",
        messagingSenderId: "75716030773",
        appId: "1:75716030773:web:59f609a633fdac9ac45c7c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. 회원(랭킹) 데이터 실시간 감시 및 렌더링
    onSnapshot(query(collection(db, "ranking"), orderBy("status", "desc")), (snap) => {
        const list = document.getElementById("playerList");
        list.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>[${p.centerId}]</b><br>${p.name}</td>
                <td>${p.timeGroup} / ${p.league}<br>${p.gender}</td>
                <td class="edit-mode"><input type="number" value="${p.groupRank}" id="rank-${d.id}">위</td>
                <td><span class="status-tag ${p.status==='approved'?'status-approved':'status-pending'}">${p.status}</span></td>
                <td>
                    ${p.status === 'pending' ? `<button class="btn btn-approve" onclick="updateStatus('ranking', '${d.id}', 'approved')">승인</button>` : ''}
                    <button class="btn btn-edit" onclick="updateRank('${d.id}')">수정</button>
                    <button class="btn btn-delete" onclick="deleteData('ranking', '${d.id}')">삭제</button>
                </td>
            `;
            list.appendChild(row);
        });
    });

    // 2. 센터 정보 데이터 실시간 감시
    onSnapshot(query(collection(db, "infoRequests"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById("centerList");
        list.innerHTML = "";
        snap.forEach(d => {
            const c = d.data();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>${c.sido}</b><br>${c.name}</td>
                <td>${c.time || '-'}</td>
                <td style="font-size:11px;">${c.addr}</td>
                <td><span class="status-tag ${c.status==='approved'?'status-approved':'status-pending'}">${c.status}</span></td>
                <td>
                    ${c.status === 'pending' ? `<button class="btn btn-approve" onclick="updateStatus('infoRequests', '${d.id}', 'approved')">승인</button>` : ''}
                    <button class="btn btn-delete" onclick="deleteData('infoRequests', '${d.id}')">삭제</button>
                </td>
            `;
            list.appendChild(row);
        });
    });

    // 3. 대회 정보 데이터 실시간 감시
    onSnapshot(query(collection(db, "matchRequests"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById("matchList");
        list.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${m.title}</td>
                <td>${m.date}</td>
                <td>${m.loc}</td>
                <td><span class="status-tag ${m.status==='approved'?'status-approved':'status-pending'}">${m.status}</span></td>
                <td>
                    ${m.status === 'pending' ? `<button class="btn btn-approve" onclick="updateStatus('matchRequests', '${d.id}', 'approved')">승인</button>` : ''}
                    <button class="btn btn-delete" onclick="deleteData('matchRequests', '${d.id}')">삭제</button>
                </td>
            `;
            list.appendChild(row);
        });
    });

    // 공통 함수: 상태 변경 (승인 등)
    window.updateStatus = async (col, id, status) => {
        if(!confirm("승인하시겠습니까?")) return;
        await updateDoc(doc(db, col, id), { status });
        alert("승인 완료");
    };

    // 랭킹 전용: 순위 수정
    window.updateRank = async (id) => {
        const newRank = document.getElementById(`rank-${id}`).value;
        await updateDoc(doc(db, "ranking", id), { groupRank: Number(newRank) });
        alert("순위가 수정되었습니다.");
    };

    // 공통 함수: 데이터 삭제
    window.deleteData = async (col, id) => {
        if(!confirm("정말로 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) return;
        await deleteDoc(doc(db, col, id));
        alert("삭제되었습니다.");
    };

</script>

</body>
</html>
