<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스쿼시 통합 관리자 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { padding: 20px; background: #f8f9fa; display: none; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px; background: #eee; border-radius: 8px; cursor: pointer; flex: 1; text-align: center; font-weight: bold; }
        .tab-btn.active { background: #2d3748; color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div id="loginSection" style="text-align:center; margin-top:100px;">
        <input type="password" id="pw" placeholder="센터 코드 입력" style="width:200px;"><br>
        <button onclick="login()" class="btn-save" style="width:200px;">로그인</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <h1 id="title">관리 시스템</h1>
        <div class="tab-menu">
            <div class="tab-btn active" onclick="setTab(0)">👤 선수관리</div>
            <div class="tab-btn" onclick="setTab(1)">📢 통합공지/대회</div>
            <div class="tab-btn" onclick="setTab(2)">📸 통합갤러리/시세</div>
        </div>

        <div class="panel active">
            <div class="card"><h3>⏳ 승인 대기 / ✅ 활동 선수</h3><div id="playerList"></div></div>
        </div>

        <div class="panel">
            <div class="card"><h3>🏢 통합 센터 안내</h3><textarea id="globalInfo" style="height:150px;"></textarea><button class="btn-save" onclick="saveGlobal('center', 'globalInfo')">공지 저장</button></div>
            <div class="card"><h3>🎾 통합 대회 정보</h3><textarea id="globalMatch" style="height:150px;"></textarea><button class="btn-save" onclick="saveGlobal('match', 'globalMatch')">대회 저장</button></div>
        </div>

        <div class="panel">
            <div class="card"><h3>📸 사진 등록</h3><input id="imgUrl" placeholder="이미지 URL"><input id="imgTitle" placeholder="제목"><button class="btn-save" onclick="addImg()">사진 추가</button></div>
            <div class="card"><h3>💰 시세 등록</h3><input id="mName" placeholder="라켓명"><input id="mPrice" placeholder="가격"><button class="btn-save" onclick="addMarket()">시세 추가</button></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, updateDoc, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = { /* 동일 설정 */ };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    let centerId = "";

    window.login = () => { /* 기존 코드맵 로직 */ centerId = "sehwa"; document.getElementById("adminPanel").style.display="block"; document.getElementById("loginSection").style.display="none"; };
    window.setTab = (i) => {
        document.querySelectorAll('.panel').forEach((p, idx) => p.classList.toggle('active', idx === i));
        document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
    };

    // 통합 데이터 저장 (globalInfo 컬렉션 사용)
    window.saveGlobal = async (type, id) => {
        await setDoc(doc(db, "globalInfo", type), { content: document.getElementById(id).value });
        alert("통합 정보가 업데이트되었습니다.");
    };

    window.addImg = async () => {
        await addDoc(collection(db, "globalGallery"), { url: document.getElementById("imgUrl").value, title: document.getElementById("imgTitle").value, createdAt: serverTimestamp() });
        alert("사진이 추가되었습니다.");
    };

    window.addMarket = async () => {
        await addDoc(collection(db, "globalMarket"), { name: document.getElementById("mName").value, price: document.getElementById("mPrice").value });
        alert("시세가 추가되었습니다.");
    };

    // 선수 관리 로직은 기존 원본과 동일하게 유지...
</script>
</body>
</html>
