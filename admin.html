<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>플랫폼 통합 관리자</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 5px; }
        .btn-blue { background: #3182ce; }
        .btn-green { background: #48bb78; }
        .btn-red { background: #f56565; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>
    <h1>🛠️ 통합 관리 도구</h1>
    
    <div class="card">
        <h3>🏢 관리할 센터 선택</h3>
        <select id="adminCenterSelect" onchange="switchAdmin()"></select>
    </div>

    <div class="card">
        <h3>🏢 센터 정보 수정</h3>
        <input id="infoLoc" placeholder="위치 주소">
        <input id="infoTel" placeholder="전화번호">
        <textarea id="infoNotice" placeholder="공지사항"></textarea>
        <button class="btn-blue" onclick="updateInfo()">정보 업데이트</button>
    </div>

    <div class="card">
        <h3>📸 사진 업로드</h3>
        <input id="photoUrl" placeholder="이미지 URL 주소">
        <input id="photoTitle" placeholder="사진 제목">
        <button class="btn-green" onclick="uploadPhoto()">갤러리 추가</button>
    </div>

    <div class="card">
        <h3>⏳ 승인 대기 명단</h3>
        <div id="pendingList"></div>
    </div>

    <div class="card">
        <h3>✅ 등록 선수 관리</h3>
        <div id="activeList"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, where, updateDoc, doc, setDoc, addDoc, serverTimestamp, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const CENTERS = { "sehwa": "세화 스쿼시", "chan": "찬스쿼시", "sq3": "스쿼시 3", "sq4": "스쿼시 4", "sq5": "스쿼시 5" };
    const firebaseConfig = { /* 원장님 키값 */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentAdminCenter = "sehwa";

    const sel = document.getElementById("adminCenterSelect");
    Object.keys(CENTERS).forEach(id => {
        const opt = document.createElement("option"); opt.value = id; opt.innerText = CENTERS[id];
        sel.appendChild(opt);
    });

    window.switchAdmin = () => {
        currentAdminCenter = sel.value;
        loadAdminData();
    };

    window.updateInfo = async () => {
        await setDoc(doc(db, "centerInfo", currentAdminCenter), {
            loc: document.getElementById("infoLoc").value,
            tel: document.getElementById("infoTel").value,
            notice: document.getElementById("infoNotice").value
        });
        alert("수정 완료");
    };

    window.uploadPhoto = async () => {
        const url = document.getElementById("photoUrl").value;
        if(!url) return alert("URL 입력 필수");
        await addDoc(collection(db, "gallery"), {
            centerId: currentAdminCenter, url, title: document.getElementById("photoTitle").value, createdAt: serverTimestamp()
        });
        alert("사진 추가됨");
    };

    function loadAdminData() {
        onSnapshot(query(collection(db, "ranking"), where("centerId", "==", currentAdminCenter), orderBy("groupRank", "asc")), (snap) => {
            let pList = "<table><tr><th>이름</th><th>승인</th></tr>";
            let aList = "<table><tr><th>순위</th><th>이름</th><th>제거</th></tr>";
            snap.forEach(d => {
                const p = d.data();
                if(p.status === 'pending') {
                    pList += `<tr><td>${p.name}</td><td><button class="btn-green" onclick="approve('${d.id}')">승인</button></td></tr>`;
                } else {
                    aList += `<tr><td>${p.groupRank}</td><td>${p.name}</td><td><button class="btn-red" onclick="remove('${d.id}')">제외</button></td></tr>`;
                }
            });
            document.getElementById("pendingList").innerHTML = pList + "</table>";
            document.getElementById("activeList").innerHTML = aList + "</table>";
        });
    }

    window.approve = async (id) => {
        await updateDoc(doc(db, "ranking", id), { status: "approved", groupRank: 1 });
        alert("승인됨");
    };

    window.remove = async (id) => {
        if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "ranking", id));
    };

    switchAdmin();
</script>
</body>
</html>
