<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스쿼시 통합 관리자 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard'; }
        body { padding: 20px; background: #f8f9fa; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .panel { display: none; } .panel.active { display: block; }
        .tab-btn { padding: 10px; background: #eee; border: none; flex: 1; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #2d3748; color: white; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginSection" style="text-align:center; margin-top:100px;">
        <h2>🏢 센터 관리자 접속</h2>
        <input type="password" id="centerCodeInput" placeholder="센터 코드 입력" style="width:250px;"><br>
        <button onclick="checkCode()" class="btn-save" style="width:250px; background:#2d3748;">관리자 로그인</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <h1 id="adminTitle">🛠️ 관리 시스템</h1>
        <div style="display:flex; gap:5px; margin-bottom:20px;">
            <button class="tab-btn active" onclick="showPanel(0)">선수 관리</button>
            <button class="tab-btn" onclick="showPanel(1)">통합 정보 관리</button>
            <button class="tab-btn" onclick="showPanel(2)">갤러리/시세</button>
        </div>

        <div id="p0" class="panel active">
            <div class="card"><h3>⏳ 승인 대기 명단</h3><div id="pendingList">로딩 중...</div></div>
            <div class="card"><h3>✅ 활동 선수 관리</h3><div id="activeList">로딩 중...</div></div>
        </div>

        <div id="p1" class="panel">
            <div class="card"><h3>📢 통합 센터 공지</h3><textarea id="gCenter" style="height:100px;"></textarea><button class="btn-save" onclick="saveGlobal('center', 'gCenter')">저장</button></div>
            <div class="card"><h3>🎾 통합 대회 정보</h3><textarea id="gMatch" style="height:100px;"></textarea><button class="btn-save" onclick="saveGlobal('match', 'gMatch')">저장</button></div>
        </div>

        <div id="p2" class="panel">
            <div class="card"><h3>📸 통합 사진 등록</h3><input id="imgU" placeholder="이미지 URL"><input id="imgT" placeholder="제목"><button class="btn-save" onclick="addImg()">등록</button></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc, setDoc, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCliruITgfBt6mIaxlM4r0McQi5T1fu-pY", authDomain: "sehwa-squash-ranking-system.firebaseapp.com", projectId: "sehwa-squash-ranking-system", storageBucket: "sehwa-squash-ranking-system.firebasestorage.app", messagingSenderId: "75716030773", appId: "1:75716030773:web:59f609a633fdac9ac45c7c" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);

    const codeMap = { 'sewha123': 'sehwa', 'chan123': 'chan' };
    let currentCenterId = "";

    window.checkCode = () => {
        const input = document.getElementById("centerCodeInput").value;
        if(codeMap[input]) {
            currentCenterId = codeMap[input];
            document.getElementById("loginSection").style.display="none";
            document.getElementById("adminPanel").style.display="block";
            startListening();
        } else { alert("코드가 틀렸습니다."); }
    };

    function startListening() {
        onSnapshot(query(collection(db, "ranking")), (snap) => {
            let pHtml = "", aHtml = "";
            snap.forEach(d => {
                const p = d.data();
                if(p.centerId === currentCenterId) {
                    if(p.status === "pending") pHtml += `<div>${p.name} <button onclick="approve('${d.id}')">승인</button></div>`;
                    else aHtml += `<div>${p.groupRank}위 ${p.name} <button onclick="del('${d.id}')">제명</button></div>`;
                }
            });
            document.getElementById("pendingList").innerHTML = pHtml || "대기자 없음";
            document.getElementById("activeList").innerHTML = aHtml || "선수 없음";
        });
    }

    window.approve = async (id) => { await updateDoc(doc(db, "ranking", id), { status: "approved", groupRank: 99 }); alert("승인 완료"); };
    window.del = async (id) => { if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "ranking", id)); };
    window.saveGlobal = async (t, id) => { await setDoc(doc(db, "globalInfo", t), { content: document.getElementById(id).value }); alert("저장 완료"); };
    window.showPanel = (n) => { document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active', i===n)); document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===n)); };
    window.addImg = async () => { await addDoc(collection(db, "globalGallery"), { url: document.getElementById("imgU").value, title: document.getElementById("imgT").value, createdAt: serverTimestamp() }); alert("등록 완료"); };
</script>
</body>
</html>
