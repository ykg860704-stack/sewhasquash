<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="adminTitle">세화 스쿼시 관리자</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { padding: 20px; max-width: 600px; margin: auto; background-color: #f4f7f6; }
        h1 { font-size: 1.5rem; color: #2d3748; margin-bottom: 20px; text-align: center; font-weight: 800; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .info { margin-bottom: 10px; font-size: 15px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .approve { background-color: #3182ce; color: white; }
        .reject { background-color: #e53e3e; color: white; }
        .center-badge { display: inline-block; padding: 4px 10px; background: #ebf8ff; border-radius: 6px; font-size: 12px; color: #2b6cb0; margin-bottom: 10px; font-weight: 700; }
    </style>
</head>
<body>

<h1 id="headerTitle">센터 관리자 승인</h1>
<div id="centerDisplay" style="text-align:center; margin-bottom:20px; font-weight:bold; color:#718096; font-size: 14px;"></div>

<div id="pendingList">
    <p style="text-align:center; color:#a0aec0; padding: 50px 0;">대기 중인 회원을 불러오는 중...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, updateDoc, deleteDoc, doc, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCliruITgfBt6mIaxlM4r0McQi5T1fu-pY",
        authDomain: "sehwa-squash-ranking-system.firebaseapp.com",
        projectId: "sehwa-squash-ranking-system",
        storageBucket: "sehwa-squash-ranking-system.firebasestorage.app",
        messagingSenderId: "75716030773",
        appId: "1:75716030773:web:59f609a633fdac9ac45c7c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ★ 핵심 수정: 주소에 값이 없으면 'sehwa'를 기본값으로 설정
    const urlParams = new URLSearchParams(window.location.search);
    const centerId = urlParams.get('center') || 'sehwa'; 

    const centerNames = { 'sehwa': '세화 스쿼시', 'daechi': '대치 국어 학원' };
    document.getElementById("adminTitle").innerText = `${centerNames[centerId] || centerId} 관리자`;
    document.getElementById("headerTitle").innerText = `${centerNames[centerId] || centerId} 승인 센터`;
    document.getElementById("centerDisplay").innerText = `현재 접속 코드: ${centerId}`;
    
    // 해당 센터의 'pending' 상태인 사람만 실시간 감시
    const q = query(
        collection(db, "ranking"), 
        where("centerId", "==", centerId), 
        where("status", "==", "pending")
    );

    onSnapshot(q, (snap) => {
        const listDiv = document.getElementById("pendingList");
        if (snap.empty) {
            listDiv.innerHTML = "<p style='text-align:center; color:#a0aec0; padding:60px;'>승인 대기 중인 회원이 없습니다. 😊</p>";
            return;
        }

        let html = "";
        snap.forEach(d => {
            const p = d.data();
            html += `
                <div class="card">
                    <div class="center-badge">${centerNames[centerId] || centerId}</div>
                    <div class="info"><strong>이름:</strong> ${p.name}</div>
                    <div class="info"><strong>구분:</strong> ${p.timeGroup} / ${p.league} / ${p.gender}</div>
                    <div class="btn-group">
                        <button class="approve" onclick="approvePlayer('${d.id}', '${p.timeGroup}', '${p.league}')">승인</button>
                        <button class="reject" onclick="rejectPlayer('${d.id}')">거절</button>
                    </div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
    });

    window.approvePlayer = async (id, timeGroup, league) => {
        if (!confirm("이 회원을 승인하시겠습니까?")) return;

        // 해당 센터, 해당 그룹에서 가장 낮은 순위 찾기
        const qRank = query(
            collection(db, "ranking"),
            where("centerId", "==", centerId),
            where("timeGroup", "==", timeGroup),
            where("league", "==", league),
            where("status", "==", "approved"),
            orderBy("groupRank", "desc"),
            limit(1)
        );

        const snap = await getDocs(qRank);
        let nextRank = 1;
        if (!snap.empty) {
            nextRank = Number(snap.docs[0].data().groupRank) + 1;
        }

        await updateDoc(doc(db, "ranking", id), {
            status: "approved",
            groupRank: nextRank,
            rankHistory: [nextRank]
        });
        alert(`승인 완료! ${nextRank}위로 배정되었습니다.`);
    };

    window.rejectPlayer = async (id) => {
        if (confirm("정말 거절(삭제)하시겠습니까?")) {
            await deleteDoc(doc(db, "ranking", id));
            alert("삭제되었습니다.");
        }
    };
</script>
</body>
</html>
