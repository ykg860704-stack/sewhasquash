<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스쿼시 통합 관리자 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        /* [기존 어드민 스타일 100% 복구] */
        body { padding: 20px; background: #f8f9fa; font-family: 'Pretendard'; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .btn-edit { background: #007bff; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
        .edit-input { width: 100%; padding: 8px; border: 1px solid #ddd; margin: 4px 0; }
        .panel { display: none; } .panel.active { display: block; }
    </style>
</head>
<body>

    <div id="loginSection" style="text-align:center; margin-top:100px;">
        <h2>🏢 센터 관리자 접속</h2>
        <input type="password" id="centerCodeInput" placeholder="코드 입력" style="padding:12px; width:250px;"><br><br>
        <button onclick="checkCode()" class="btn-save" style="width:250px; background:#2d3748;">로그인</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <h1 id="adminTitle">🛠️ 관리자 센터</h1>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button onclick="showPanel(0)">선수 관리</button>
            <button onclick="showPanel(1)">통합 정보</button>
        </div>

        <div id="p0" class="panel active">
            <div class="card"><h3>⏳ 승인 대기</h3><div id="pendingList"></div></div>
            <div class="card"><h3>✅ 활동 선수 (수정/제명)</h3><div id="activeList"></div></div>
        </div>

        <div id="p1" class="panel">
            <div class="card"><h3>📢 통합 공지</h3><textarea id="gInfo" style="width:100%; height:100px;"></textarea><button class="btn-save" onclick="saveG('center')">저장</button></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = { /* 원장님 API KEY */ };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);

    const codeMap = { 'sewha123': 'sehwa', 'chan123': 'chan' };
    let currentCenterId = "", players = [];

    window.checkCode = () => {
        const input = document.getElementById("centerCodeInput").value;
        if(codeMap[input]) {
            currentCenterId = codeMap[input];
            document.getElementById("loginSection").style.display="none";
            document.getElementById("adminPanel").style.display="block";
            startListening();
        } else { alert("코드 오류"); }
    };

    function startListening() {
        // 기존 어드민의 상세 수정 로직 복구
        onSnapshot(query(collection(db, "ranking"), orderBy("groupRank", "asc")), (snap) => {
            let pHtml = "<table>", aHtml = "<table>";
            snap.forEach(d => {
                const p = {id: d.id, ...d.data()};
                if(p.centerId === currentCenterId) {
                    if(p.status === 'pending') {
                        pHtml += `<tr><td>${p.name}</td><td><button onclick="approve('${p.id}')">승인</button></td></tr>`;
                    } else {
                        aHtml += `<tr id="row-${p.id}"><td>${p.groupRank}위</td><td>${p.name}</td><td><button class="btn-edit" onclick="toggleEdit('${p.id}')">수정</button></td></tr>`;
                    }
                }
            });
            document.getElementById("pendingList").innerHTML = pHtml + "</table>";
            document.getElementById("activeList").innerHTML = aHtml + "</table>";
        });
    }

    // [기존 어드민의 toggleEdit, saveEdit, syncData 로직을 그대로 붙여넣으시면 됩니다]
    window.approve = async (id) => { 
        await updateDoc(doc(db, "ranking", id), { status: "approved", groupRank: 99 }); 
        alert("승인되었습니다.");
    };
    
    window.showPanel = (n) => { document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active', i===n)); };
</script>
</body>
</html>
